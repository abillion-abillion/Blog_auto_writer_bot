name: 블로그 초안 자동 생성

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  generate-blog-draft:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install anthropic feedparser requests

      - name: 블로그 초안 생성 및 텔레그램 전송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BLOG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BLOG_BOT_CHAT_ID }}
        run: |
          python blog_draft.py
